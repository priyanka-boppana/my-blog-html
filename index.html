<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priyanka Boppana</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* Base Styles from your original file */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #fff; color: #333; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.97); backdrop-filter: blur(8px); z-index: 100; }
  .nav-name { font-family: 'Lora', serif; font-size: 1.2rem; color: #222; cursor: pointer; font-style: italic; }
  .nav-links { display: flex; gap: 24px; list-style: none; }
  .nav-links button { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links button:hover { color: #222; }
  .page { display: none; }
  .page.active { display: block; }
  .hero { text-align: center; padding: 80px 20px 60px; }
  .hero-img { width: 120px; height: 120px; border-radius: 50%; background: #f0f0f0; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 42px; overflow: hidden; position: relative; cursor: pointer; border: 3px solid #eee; }
  .hero-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; border-radius: 50%; }
  .hero h1 { font-family: 'Lora', serif; font-size: 32px; color: #222; margin-bottom: 10px; }
  .hero p { color: #888; font-size: 15px; max-width: 400px; margin: 0 auto 24px; line-height: 1.7; }
  .pill { display: inline-flex; align-items: center; gap: 8px; background: #f5f5f5; border-radius: 30px; padding: 10px 18px; font-size: 14px; color: #444; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; margin: 5px; }
  .pill:hover { background: #222; color: #fff; transform: translateY(-2px); }
  section { padding: 60px 40px; max-width: 900px; margin: 0 auto; border-top: 1px solid #f0f0f0; }
  h2 { font-family: 'Lora', serif; font-size: 22px; color: #222; margin-bottom: 24px; }
  .recipe-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 12px; }
  .recipe-card-btn { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 20px; cursor: pointer; text-align: left; transition: all 0.2s; width: 100%; }
  .recipe-card-btn:hover { background: #222; color: #fff; transform: translateY(-3px); }
  .rc-emoji { font-size: 32px; margin-bottom: 10px; }
  .rc-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .rc-desc { font-size: 12px; color: #888; line-height: 1.5; }
  .story-content { line-height: 1.9; color: #444; font-size: 17px; font-family: 'Lora', serif; }
  .story-content p { margin-bottom: 1.6rem; }
  .back-btn { background: #f5f5f5; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 30px; font-size: 13px; }
  footer { text-align: center; padding: 40px; color: #bbb; font-size: 12px; border-top: 1px solid #eee; }
</style>
</head>
<body>

<nav>
  <div class="nav-name" onclick="showMain()">Priyanka Boppana</div>
  <ul class="nav-links">
    <li><button onclick="showMain()">Home</button></li>
    <li><button onclick="openInterest('stories')">Stories</button></li>
    <li><button onclick="openInterest('cooking')">Cooking</button></li>
  </ul>
</nav>

<div id="mainPage" class="page active">
  <div class="hero">
    <div class="hero-img">🌸</div>
    <h1>Hi, I'm Priyanka 👋</h1>
    <p>A keeper of stories and a lover of home-cooked flavors.</p>
    <div>
      <button class="pill" onclick="openInterest('stories')">📖 Tara's Stories</button>
      <button class="pill" onclick="openInterest('cooking')">🍳 Food & Recipes</button>
    </div>
  </div>
  <section id="interests">
    <h2>💛 My Interests</h2>
    <div class="interest-list">
      <button class="pill" onclick="openInterest('stories')"><span>📖</span> Tara's Stories</button>
      <button class="pill" onclick="openInterest('cooking')"><span>🍳</span> Cooking</button>
      <button class="pill" onclick="openInterest('photography')"><span>📸</span> Photography</button>
      <button class="pill" onclick="openInterest('tech')"><span>💻</span> Tech</button>
    </div>
  </section>
  <footer>© 2026 Priyanka Boppana · Made with ♥</footer>
</div>

<div id="interestPage" class="page">
  <div class="interest-page" style="padding: 60px 40px; max-width: 700px; margin: 0 auto;">
    <button class="back-btn" onclick="showMain()">← Back</button>
    <h1 id="iTitle" style="font-family:'Lora', serif; font-size: 32px; margin-bottom: 12px;"></h1>
    <p id="iDesc" style="color: #777; margin-bottom: 30px;"></p>
    <div id="iContent" class="recipe-cards"></div>
  </div>
</div>

<div id="detailPage" class="page">
  <div class="recipe-page" style="padding: 60px 40px; max-width: 750px; margin: 0 auto;">
    <button class="back-btn" id="detailBackBtn">← Back</button>
    <div id="dEmoji" style="font-size: 48px; margin-bottom: 16px;"></div>
    <h1 id="dTitle" style="font-family:'Lora', serif; font-size: 32px; margin-bottom: 24px;"></h1>
    <div id="dBody"></div>
  </div>
</div>

<script>
const data = {
  stories: [
    { key: 'ride', emoji: '🚲', name: 'The Morning Ride', desc: 'Overcoming fear with Grandpa.', body: `<div class="story-content"><p>Tara was a bright and curious little girl who loved trying new things...</p></div>` },
    { key: 'hands', emoji: '👐', name: 'Soft Hands of Love', desc: 'A memory of Grandma’s warmth.', body: `<div class="story-content"><p>What Tara remembered the most were her grandmother’s hands...</p></div>` },
    { key: 'festivals', emoji: '🃏', name: 'The Joy of Festivals', desc: 'Card games and family laughter.', body: `<div class="story-content"><p>Her favorite part was when everyone sat together to play cards...</p></div>` },
    { key: 'diwali', emoji: '🪔', name: 'The Lights of Diwali', desc: 'From loud crackers to soft glows.', body: `<div class="story-content"><p>Tara realized that Diwali was about light, love, and togetherness.</p></div>` },
    { key: 'birthdays', emoji: '🎂', name: 'Special Birthdays', desc: 'Fairy lights and feeling like a princess.', body: `<div class="story-content"><p>Tara loved how everything felt like a celebration just for her.</p></div>` },
    { key: 'food', emoji: '🥘', name: 'Mother’s Homemade Food', desc: 'A warm connection in every bite.', body: `<div class="story-content"><p>Opening the parcels, Tara could almost feel her mother’s love.</p></div>` }
  ],
  cooking: [
    { key: 'shrimp', emoji: '🍤', name: 'Shrimp Pulav', desc: 'Fragrant one-pot rice.', body: `<p>Process: Sauté spices, add shrimp and rice, cook for 5 mins.</p>` }
  ]
};

function openInterest(cat) {
  const list = data[cat] || [];
  document.getElementById('iTitle').textContent = cat === 'stories' ? "Tara's Stories" : "Cooking";
  document.getElementById('iDesc').textContent = "A collection of my favorite memories and recipes.";
  document.getElementById('iContent').innerHTML = list.map(item => `
    <button class="recipe-card-btn" onclick="openDetail('${cat}', '${item.key}')">
      <div class="rc-emoji">${item.emoji}</div>
      <div class="rc-name">${item.name}</div>
      <div class="rc-desc">${item.desc}</div>
    </button>`).join('');
  showPage('interestPage');
}

function openDetail(cat, key) {
  const item = data[cat].find(i => i.key === key);
  document.getElementById('dEmoji').textContent = item.emoji;
  document.getElementById('dTitle').textContent = item.name;
  document.getElementById('dBody').innerHTML = item.body;
  document.getElementById('detailBackBtn').onclick = () => showPage('interestPage');
  showPage('detailPage');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showMain() { showPage('mainPage'); }
</script>
</body>
</html>
